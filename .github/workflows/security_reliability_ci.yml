name: Security and Reliability CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-security-reliability:
    name: Go Security and Reliability Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download Go modules
        run: go mod download

      - name: Static analysis (go vet)
        run: go vet ./cmd/gobpm ./internal/app ./internal/pkg/redaction ./server/interceptors/... ./server/transports/grpcs/common ./server/transports/https/common

      - name: Race checks
        run: go test -race ./internal/app ./internal/pkg/redaction ./server/interceptors/... ./server/transports/grpcs/common ./server/transports/https/common

      - name: Build entrypoint
        run: go build ./cmd/gobpm

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/gobpm ./internal/app ./internal/pkg/redaction ./server/interceptors/... ./server/transports/grpcs/common ./server/transports/https/common

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2