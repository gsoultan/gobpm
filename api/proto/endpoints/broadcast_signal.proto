syntax = "proto3";

package process;

import "google/protobuf/struct.proto";

option go_package = "github.com/gsoultan/gobpm/api/proto/endpoints;endpoints";

message BroadcastSignalRequest { string project_id = 1; string signal_name = 2; google.protobuf.Struct variables = 3; } message BroadcastSignalResponse { string error = 1; }
