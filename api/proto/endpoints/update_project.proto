syntax = "proto3";

package process;


option go_package = "github.com/gsoultan/gobpm/api/proto/endpoints;endpoints";

message UpdateProjectRequest { 
  string id = 1; 
  string organization_id = 2;
  string name = 3; 
  string description = 4; 
} 
message UpdateProjectResponse { 
  string error = 1; 
}
