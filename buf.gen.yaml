version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: api/proto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: api/proto
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.1
    out: api/proto
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v1.5.0
    out: ui/src/gen
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: ui/src/gen
    opt:
      - target=ts
inputs:
  - directory: api/proto
